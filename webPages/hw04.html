<body>
    <nav>
        <a href="../index.html"><span class='brand'>SAPAR</span></a>
        <ul>
            <li><a href="https://bayan2019.github.io/resume/">Resume</a></li>
            <li><a href="./HomeWorksPage/index.html">Home Works</a></li>
        </ul>
    </nav>
    <main style="margin: auto; padding-left: 50px;">
        <section style="text-align: left;">
            <h2>Элементы формы</h2>
            <form action="/submit" method="post">
                <fieldset>
                    <legend>Tell about yourself</legend>
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required><br />
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required><br />
                    <label for="age">How old are you:</label>
                    <input type="number" id="age" name="age"><br />
                    <label for="email">Email:</label>
                    <input id="email" type="email" name="email" required><br />
                    <label for="password">Password:</label>
                    <input id="password" type="password" name="password" required><br />
                    <label for="about">Tell about yourself:</label>
                    <textarea id="about" name="about" rows="4" cols="50"></textarea><br />
                    <label for="country">From which Country you are:</label>
                    <select id="country" name="country" required>
                        <option value="">Select your country</option>
                        <option value="us">United States</option>
                        <option value="ca">Canada</option>
                        <option value="uk">United Kingdom</option>
                        <option value="au">Australia</option>
                    </select><br />
                </fieldset>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </form>
        </section>
    </main>
    <footer class="bg-light text-center py-4 border-top">
        <div class="container">

            <a href="#" class="text-secondary text-decoration-none small">Help Center</a>
            </div>
        </div>
    </footer>
</body>
